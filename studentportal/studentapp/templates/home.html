{% load static %}

<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>
        {% block footer %}
        <div class="container-fluid bg-danger text-light text-center">
            <h2 class="py-5">WELCOME TO ABC STUDENT PORTAL APP</h2>
        </div>
        
        <main>
            <div class="container-fluid">
                <div class="row d-flex justify-content-center">
                    <div class="col-sm-6">
                        <img class="img-fluid" src="{% static 'images/homestudent.jpg' %}" alt="home image"
                        style="min-height: 70vh;background-repeat: no-repeat;">
                    </div>

                    <div class="col-sm-6 align-content-center">
                        <div class="card p-4 shadow" style="width: 65%;">
                            <form action="{% url 'login' %}" method="post" class="justify-content-center">
                                {% csrf_token %}
                                
                                <div class="input-group flex-nowrap">
                                    <span class="input-group-text" id="addon-wrapping">@</span>
                                    <input type="text" class="form-control" placeholder="Username" name="uname" aria-label="Username" aria-describedby="addon-wrapping">
                                  </div>
                                <br><br>
                                  <div class="input-group flex-nowrap">
                                    <span class="input-group-text" id="addon-wrapping">P</span>
                                    <input type="password" class="form-control" placeholder="Password" aria-label="Password" name="pwrd" aria-describedby="addon-wrapping">
                                  </div>
                                <div class="text-center mt-4">
                                    <a href="{% url 'reg' %}" class="btn btn-primary">
                                        Register Here
                                    </a>
                                    
                                    <button type="submit" class="btn btn-primary">
                                        Sign In
                                    </button>
                                </div>                            
                            </form>
                          </div>
                    </div>
                </div>
            </div>
        </main>

        {% endblock footer %}
        <footer>
            
              
            <div class="container-fluid bg-dark">
                <div class="row text-light text-center py-3">
                    <div class="col-sm-6">
                        <h5>ABC Student Portal App</h5>
                        <p>About us</p>
                    </div>
                    <div class="col-sm-6">
                        <p>Contact Us</p>
                        <p>+91 - xxxxxxxxxx</p>
                        <p>abcspa@gmail.com</p>
                    </div>
                </div>
            </div>
            
            
        </footer>


        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
